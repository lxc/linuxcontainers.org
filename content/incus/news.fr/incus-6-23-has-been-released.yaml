title: Incus 6.23 est maintenant disponible
date: 2026/03/27 23:03
origin: https://discuss.linuxcontainers.org/t/incus-6-23-has-been-released/26447
content: |-
  # Introduction

  <!--
  The Incus team is pleased to announce the release of Incus 6.23!
  -->
  L’équipe d’Incus est heureuse d’annoncer la sortie d’Incus 6.23 !

  <!--
  This release is going to be our last 6.x release before Incus 7.0 LTS which is due out on April 30th.
  -->
  Cette version est la dernière de la série 6.x, précédant la sortie d’Incus 7.0 LTS prévue pour le 30 avril.

  <!--
  It's also quite a busy release with a good mix of security issues (mostly thanks to an ongoing analysis by 7asecurity), bug fixes and performance improvements and then a very good selection of features from expanding our OS support for VMs to adding more flexible instance storage with dependent volumes!
  -->
  C’est également une nouvelle version très complète, avec la résolution d’un bon nombre de vulnérabilités (en grande partie grâce à une analyse en cours de 7asecurity) et de bugs, des améliorations des performances, et de nouvelles fonctionnalités étendant le support des OS invités et rendant la gestion du stockage plus flexible avec les volumes dépendants.

  [![image|690x357](https://discuss.linuxcontainers.org/uploads/default/original/2X/c/c1d49ae001824f3df9d5ec32c2191199f41cfbbf.jpeg)](https://linuxcontainers.org/incus/try-it/)


  <!--
  As usual, you can try Incus for yourself online: https://linuxcontainers.org/incus/try-it/
  -->
  Comme d’habitude, vous pouvez l’essayer vous-même en ligne : https://linuxcontainers.org/incus/try-it/

  <!--
  Enjoy!
  -->

  <!--
  # New maintainers
  With this Incus release the Incus project is welcoming two new maintainers:
  -->
  # Nouveaux mainteneurs
  Cette nouvelle version est l’occasion pour le projet Incus d’accueillir deux nouveaux mainteneurs :

   - Benjamin Somers
   - Piotr Resztak

  <!--
  They are both long time contributors to Incus who have been involved with a variety of features and bugfixes throughout the Incus codebase and who are therefore well qualified to help with code reviews and general project direction and maintenance.
  -->
  Ils contribuent tous deux depuis un certain temps à Incus, et ont été impliqués dans le développement de bon nombre de nouvelles fonctionnalités et correctifs de bugs dans une grande partie de la base de code d’Incus. Ils sont donc suffisamment qualifiés pour aider à la revue de code et à l’orientation et à la maintenance du projet.

  <!--
  They're joining the existing maintainers:
  -->
  Ils rejoignent les mainteneurs historiques :

   - Aleksa Sarai
   - Christian Brauner
   - Free Ekanayaka
   - Serge Hallyn
   - Stéphane Graber
   - Tycho Andersen

  <!--
  # Security fixes
  This release fixes 6 security issues:
  -->
  # Correctifs de sécurité
  Cette version corrige 6 vulnérabilités :

  <!--
   - [CVE-2026-33711](https://github.com/lxc/incus/security/advisories/GHSA-q9vp-3wcg-8p4x) (low)
   - [CVE-2026-33542](https://github.com/lxc/incus/security/advisories/GHSA-p8mm-23gg-jc9r) (moderate)
   - [CVE-2026-33743](https://github.com/lxc/incus/security/advisories/GHSA-vg76-xmhg-j5x3) (moderate)
   - [CVE-2026-33898](https://github.com/lxc/incus/security/advisories/GHSA-453r-g2pg-cxxq) (high)
   - [CVE-2026-33897](https://github.com/lxc/incus/security/advisories/GHSA-83xr-5xxr-mh92) (critical)
   - [CVE-2026-33945](https://github.com/lxc/incus/security/advisories/GHSA-q4q8-7f2j-9h9f) (critical)
