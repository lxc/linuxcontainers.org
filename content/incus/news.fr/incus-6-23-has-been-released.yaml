   - [CVE-2026-33711](https://github.com/lxc/incus/security/advisories/GHSA-q9vp-3wcg-8p4x) (faible)
   - [CVE-2026-33542](https://github.com/lxc/incus/security/advisories/GHSA-p8mm-23gg-jc9r) (modérée)
   - [CVE-2026-33743](https://github.com/lxc/incus/security/advisories/GHSA-vg76-xmhg-j5x3) (modérée)
   - [CVE-2026-33898](https://github.com/lxc/incus/security/advisories/GHSA-453r-g2pg-cxxq) (haute)
   - [CVE-2026-33897](https://github.com/lxc/incus/security/advisories/GHSA-83xr-5xxr-mh92) (critique)
   - [CVE-2026-33945](https://github.com/lxc/incus/security/advisories/GHSA-q4q8-7f2j-9h9f) (critique)

  <!--
  All of the above except for CVE-2026-33542 were found as part of an ongoing security review of Incus by [7asecurity](https://7asecurity.com).
  -->
  À l’exception de la CVE-2026-33542, toutes ces vulnérabilités ont été identifiées dans le cadre d’une analyse de sécurité toujours en cours par [7asecurity](https://7asecurity.com).

  <!--
  Backports to our LTS branch are available in the stable-6.0 branch and the distributions shipping Incus LTS have been notified and have published or will very soon publish updated packages.
  -->
  Les correctifs ont été rétroportés sur notre branche LTS (`stable-6.0`), et les distributions proposant Incus LTS ont été notifiées et ont publié (ou vont prochainement publier) des paquets mis à jour.

  <!--
  # New features
  ## Dependent storage volumes
  Incus now supports "dependent" volumes. Those are effectively the same as a regular custom volume attached to an instance, except that it is fully tied to the instance.
  -->
  # Nouvelles fonctionnalités
  ## Volumes de stockage dépendants
  Incus supporte désormais des volumes dits « dépendants ». Ils se comportent de la même manière que des volumes personnalisés attachés à une instance, à la différence qu’un lien explicite est créé entre le volume et l’instance.

  <!--
  This means that deleting the instance will also delete the volume, creating an instance snapshot will create a matching snapshot on the volume, instance backups will include and restore the dependent volumes and migrating the instance will take the dependent volumes along for the ride.
  -->
  Supprimer une instance comportant des volumes dépendants supprimera également ces derniers ; prendre un instantané de l’instance prendra aussi un instantané de ses volumes dépendants ; les sauvegardes et les migrations inclueront également ces derniers.

      stgraber@castiana:~$ incus launch images:debian/13 c1
      Launching c1
      stgraber@castiana:~$ incus storage volume create default c1-extra dependent=true
      Storage volume c1-extra created
      stgraber@castiana:~$ incus config device add c1 extra disk pool=default source=c1-extra dependent=true path=/extra
      Device extra added to c1
      stgraber@castiana:~$ incus storage volume snapshot create default c1-extra test
      Error: Direct snapshots are not allowed for dependent volumes
      stgraber@castiana:~$ incus snapshot create c1 foo
      stgraber@castiana:~$ incus storage volume snapshot list default c1-extra
      +------+----------------------+------------+
      | NAME |       TAKEN AT       | EXPIRES AT |
      +------+----------------------+------------+
      | foo  | 2026/03/27 18:54 EDT |            |
      +------+----------------------+------------+
      stgraber@castiana:~$ incus snapshot delete c1 foo
      stgraber@castiana:~$ incus storage volume snapshot list default c1-extra
      +------+----------+------------+
      | NAME | TAKEN AT | EXPIRES AT |
      +------+----------+------------+

  <!--	
  ## FreeBSD VM support
  Incus now supports running its agent on FreeBSD.
  Similar to the MacOS support, this relies on a network connection between Incus and the agent, requiring the VM to run on an Incus-managed network.
  -->
  ## Support des VM FreeBSD
  L’agent d’Incus peut à présent être lancé sur des invités FreeBSD.
  De la même manière que pour macOS, l’agent nécessite une connexion réseau avec Incus, et donc que la VM soit dans un réseau géré par Incus.

  <!--
  Daily builds of FreeBSD 14 and 15 are availabe on our image server.
  -->
  Des images de FreeBSD 14 et 15 construites quotidiennement sont disponibles sur notre serveur d’images.

      stgraber@castiana:~$ incus launch images:freebsd/15.0 bsd -c security.secureboot=false --vm
      Launching bsd
      stgraber@castiana:~$ incus wait bsd agent && incus exec bsd sh
      # freebsd-version·
      15.0-RELEASE

  <!--
  **NOTE:** It may take a little while before all packagers include the need build recipe for the FreeBSD agent, leading to some Incus 6.23 systems being unable to get a shell out of the box. Rebooting the VM into single user mode will allow setting up a root password and using it through the console.
  -->
  **NOTE :** L’agent peut mettre du temps à arriver dans toutes les distributions Linux, aussi les systèmes exécutant Incus 6.23 n’auront pas tous la possibilité d’en utiliser les fonctionnalités. Un redémarrage de la VM en mode mono-utilisateur permet de définir un mot de passe pour l’utilisateur root, permettant d’utiliser la console.

  <!--
  ## Reworked CLI parser
  The main command line parser for the `incus` command has gone through a few improvements. It now has much better errors to indicate what argument may be wrong or missing as well as colored output to improve the legibility of the help messages.
  -->
  ## Nouveau parseur pour la CLI Incus
  Un certain nombre d’améliorations ont été apportées à l’outil en ligne de commande `incus`. Celui-ci peut désormais mieux identifier les erreurs dans l’utilisation des arguments, et utilise des couleurs pour améliorer la clarté des messages d’aide.

  ![image|690x192](https://discuss.linuxcontainers.org/uploads/default/optimized/2X/7/7f739d7643ef565323a879de4b9f68d3ce54f20a_2_690x192.png)

  <!--
  ## Support for disabling DHCP announcement of the gateway
  It's now possible to set `ipv4.dhcp.gateway` to the special `none` value to have Incus configure its DHCP server to only configure IP addresses but not push any routes.
  -->
  ## Support de la désactivation des annonces de la passerelle en DHCP
  Il est désormais possible de définir `ipv4.dhcp.gateway` avec la valeur spéciale `none` pour indiquer à Incus de ne pas pousser de routes en DHCP.

  <!--
  This can be particularly useful when some instances are connected to multiple networks with some of those networks not meant to route traffic to the outside world.
  -->
  Cette option est particulièrement utile lorsque des instances sont connectées à plusieurs réseaux, certains desquels ne routant pas de trafic vers l’extérieur.

  <!--
  ## Support for `ipv4.dhcp.gateway` on OVN networks
  Related to the previous feature, OVN now also supports `ipv4.dhcp.gateway`, including the new special `none` value.
  -->
  ## Support de `ipv4.dhcp.gateway` sur les réseaux OVN
  En lien avec la fonctionnalité précédente, les réseaux OVN supportent à présent l’option `ipv4.dhcp.gateway`, y compris sa nouvelle valeur `none`.

  <!--
  This allows having another instance or machine on the OVN network act as the gateway in place of the virtual router, or configuring the OVN DHCP service to not advertised a default route at all.
  -->
  Cela permet qu’une instance du réseau OVN soit utilisée comme passerelle à la place du routeur virtuel, ou encore de désactiver l’annonce de route par défaut.

  <!--
  ## Support for `io.bus` on OVN NICs
  It's now possible to use `io.bus` with OVN NICs.
  -->
  ## Support de `io.bus` sur les cartes réseau OVN
  Il est maintenant possible d’utiliser `io.bus` avec les cartes réseau OVN.

  <!--
  This effectively allows adding a USB network interface to a VM and have it be connected to an OVN network.
  -->
  Cela permet d’ajouter à des VM des interfaces réseau USB connectées à des réseaux OVN.

  <!--
  ## VM agent lifecycle events
  Two new lifecycle events have been added in this release:
  -->
  ## Événements de cycle de vie pour l’agent Incus
  Deux nouveaux événements de cycle de vie ont été ajoutés dans cette version :

   - instance-agent-started
   - instance-agent-stopped

  <!--
  The events should be pretty self-explanatory. They are limited to Incus VMs and will be emitted as soon as Incus receives an agent notification over the serial connection.
  -->
  Leurs noms parlent d’eux-mêmes. Ces événements sont limités aux VM, et sont émis dès qu’Incus reçoit une notification de l’agent sur sa connexion série.

  <!--
  ## Reworked `incus file pull` and `incus storage volume file pull`
  The file pulling logic in both commands has been updated to match behavior with the popular `cp` command.
  -->
  ## Réécriture de `incus file pull` et `incus storage volume file pull`
  La logique de récupération de fichiers des deux commandes a été réécrite pour mieux correspondre au comportement de la commande `cp`.

  <!--
  This specifically relates to handling of symlinks with the following options being now supported:
  -->
  Cette modification permet de mieux gérer les liens symboliques, aves les nouvelles options suivantes :

  <!--
   - `-L` (Always follow symbolic links in source path)
   - `-H` (Follow command-line symbolic links in source path)
   - `-P` (Never follow symbolic links in source path)
  -->
   - `-L` (Toujours suivre les liens symboliques source)
   - `-H` (Seulement suivre les liens symboliques source fournis en arguments)
   - `-P` (Ne jamais suivre les liens symboliques source)

  <!--
  ## Project related metrics
  Some new metrics have been added to provide for project-wide statistics.
  -->
  ## Métriques relatives aux projets
  De nouvelles métriques ont été ajoutées pour fournir des statistiques sur les projets.

