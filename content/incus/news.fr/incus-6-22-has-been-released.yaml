title: Incus 6.22 est maintenant disponible
date: 2026/02/27 18:02
origin: https://discuss.linuxcontainers.org/t/incus-6-22-has-been-released/26300
content: |-
  # Introduction

  <!--
  The Incus team is pleased to announce the release of Incus 6.22!
  -->
  L’équipe d’Incus est heureuse d’annoncer la sortie d’Incus 6.22 !

  <!--
  This is quite the busy release with a lot of changes all across the board on top of a large quantities of bugfixes. There should be something for everyone!
  -->
  Cette nouvelle version est assez dense, avec de nombreux changements aux quatre coins du projet, ainsi qu’un grand nombre de corrections de bugs. Tout le monde devrait y trouver son compte !

  [![image|690x245](https://discuss.linuxcontainers.org/uploads/default/original/2X/a/a3913a05d7c84f73546edc305dccc04007f0e1bc.png)](https://linuxcontainers.org/incus/try-it/)

  <!--
  As usual, you can try it for yourself online: https://linuxcontainers.org/incus/try-it/
  -->
  Comme d’habitude, vous pouvez l’essayer vous-même en ligne : https://linuxcontainers.org/incus/try-it/

  <!--
  Enjoy!
  -->

  <!--
  # New features
  ## vsock support for the WIndows agent
  Back when we introduced the Incus VM agent for Windows, the Virtio Vsock driver for Windows was still awaiting signature by Microsoft and Go support for vsock on Windows was completely missing.
  -->
  # Nouvelles fonctionnalités
  ## Support de VSOCK dans l’agent Windows
  Lorsque nous avons ajouté le support de l’agent Incus pour les VM Windows, le driver Windows pour VirtIO VSOCK n’était toujours pas signé par Microsoft et le support dans Go pour VSOCK sur les systèmes Windows était absent.

  <!--
  Both of those have now been fixed and allowed us to start building our Windows agent with vsock as the transport rather than TCP. This matches the behavior we have on Linux and allows for interacting with the VM agent in environments where Incus doesn't know the IP address of the VMs it's running or where it's not allowed connecting to the VM's IP address.
  -->
  Ces deux limitations étant à présent levées, nous utilisons désormais VSOCK au lieu de TCP pour le transport des données de l’agent Windows. Le comportement est ainsi similaire à celui des systèmes Linux, permettant d’interagir avec l’agent même lorsqu’Incus ne connaît pas l’adresse IP de la VM ou n’a pas la permission de s’y connecter.

      stgraber@castiana:~ (incus:dev-cluster01/default)$ incus list Windows
