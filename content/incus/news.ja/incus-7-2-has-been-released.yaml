title: Incus 7.2 リリースのお知らせ
date: 2026/06/26 19:06
origin: https://discuss.linuxcontainers.org/t/incus-7-2-has-been-released/26879
content: |-
  <!--
  The Incus team is pleased to announce the release of Incus 7.2!
  -->
  Incus チームは、Incus 7.2 のリリースのアナウンスができてうれしいです!

  <!--
  It's another pretty busy release for us with a varied set of new features across the board as well as the usual set of performance improvements and bugfixes.
  -->
  今回も、多岐にわたる新機能や、いつものようにパフォーマンス向上やバグ修正を含む、盛りだくさんなリリースとなっています。

  [![image|690x336](https://discuss.linuxcontainers.org/uploads/default/original/2X/1/101a5f56b04d58d044d1e7d773827ba1493e4e4a.png)](https://linuxcontainers.org/incus/try-it/)

  <!--
  As usual, you can try Incus for yourself online: [Linux Containers - Incus - Try it online](https://linuxcontainers.org/incus/try-it/)
  -->
  いつものように、オンラインでご自身で試せます: [Linux Containers - Incus - オンラインでの試用](https://linuxcontainers.org/incus/try-it/)

  # セキュリティ修正 <!-- Security fixes -->
  <!--
  This release fixes 8 security issues:
  -->
  このリリースでは、8 件のセキュリティ問題を修正しました:

  - [CVE-2026-48749](https://github.com/lxc/incus/security/advisories/GHSA-2q3f-q5pq-g8wv) (critical) - 悪意あるイメージ内の `rootfs/` シンボリックリンクを経由したホスト上の任意のファイルの読み書き <!-- Arbitrary file read+write on host via `rootfs/` symlink in malicious image -->
  - [CVE-2026-48750](https://github.com/lxc/incus/security/advisories/GHSA-73hr-m85f-64v9) (critical) - 細工されたイメージ内の `exec-output` シンボリックリンクを介したホスト上の任意のファイルに対する書き込み <!-- Arbitrary file write on host via `exec-output` symlink in crafted image -->
  - [CVE-2026-48751](https://github.com/lxc/incus/security/advisories/GHSA-48q5-w887-33wv) (critical) - 任意のコマンド実行につながるプロジェクト制限のバイパス <!-- Restricted project bypass leading to arbitrary command execution -->
  - [CVE-2026-48752](https://github.com/lxc/incus/security/advisories/GHSA-vxp5-584q-c479) (critical) - 悪意あるイメージ内の `templates/` シンボリックリンクを介したホスト上の任意のファイルの読み書き <!-- Arbitrary file read+write on host via `templates/` symlink in malicious image -->
  - [CVE-2026-48755](https://github.com/lxc/incus/security/advisories/GHSA-v6mj-8pf4-hhw4) (critical) - 任意のファイルへの書き込みおよびコマンド実行につながる、バックアップ圧縮アルゴリズムにおける引数インジェクション <!-- Argument injection in backup compression algorithm leading to arbitrary file write and command execution -->
  - [CVE-2026-48769](https://github.com/lxc/incus/security/advisories/GHSA-f6m5-xw2g-xc4x) (critical) - 信頼されたイメージハッシュに起因するクライアント上の任意のファイルに対する書き込み <!-- Arbitrary file write on client due to trusted image hash -->
  - [CVE-2026-55621](https://github.com/lxc/incus/security/advisories/GHSA-64f3-v33m-w89f) (high) - プロジェクト間のカスタムボリュームコピーに対するプロジェクト制限のバイパス <!-- Project restriction bypass for custom volume copy across projects -->
  - [CVE-2026-55622](https://github.com/lxc/incus/security/advisories/GHSA-c9f5-j9c3-mhrg) (high) - プロジェクト間のインスタンスコピーにおけるプロジェクト制限の回避 <!-- Project restriction bypass in instance copy across projects -->

  # 新機能 <!-- New features -->
  ## インスタンスごとの SELinux 統合 <!-- Per-instance SELinux integration -->
  <!--
  Incus now supports per-instance SELinux confinement for both containers and virtual machines, with automatic MCS (Multi-Category Security) level allocation to isolate instances from one another on the same host.
  -->
  Incus は、コンテナと仮想マシンの両方に対して、インスタンスごとの SELinux 隔離をサポートするようになりました。同じホスト上のインスタンスをお互いに分離するために、MCS（マルチカテゴリーセキュリティ）を自動的に割り当てます。

  <!--
  Four new instance configuration keys were introduced:
  ->
  新たにインスタンス設定キーが 4 つ導入されました:

  - `security.selinux.domain`: SELinux プロセスドメインを上書きします <!-- Override the SELinux process domain. -->
  - `security.selinux.type`: インスタンスストレージに使用する SELinux ファイルタイプを上書きします <!-- Override the SELinux file type used for the instance storage. -->
  - `security.selinux.level`: SELinux MCS レベルを上書きします <!-- Override the SELinux MCS level. -->
  - `security.selinux.label_rootfs`: rootfs のラベリング動作をコントロールします（`auto`、`always`、`never`のいずれか）<!-- Control rootfs labeling behavior (`auto`, `always` or `never`). -->

  <!--
  The computed context is persisted in the `volatile.selinux.context` key so that the allocated MCS range stays stable across restarts.
  -->
  計算されたコンテキストは、`volatile.selinux.context` キーに保持されるため、割り当てられた MCS レンジは再起動後も一定の状態を保ちます。

  ドキュメント<!-- Documentation -->: https://linuxcontainers.org/incus/docs/main/reference/instance_options/#instance-options-security

  ## 新しい `incus default` CLI コマンド <!-- New `incus default` CLI command -->
  <!--
  A new `incus default` command has been added to help control CLI default options.
  -->
  CLI のデフォルトオプションを制御しやすくするために `incus default` コマンドが追加されました。

      stgraber@orilla:~$ incus default show
      list_format: ""
      console_type: ""
      console_spice_command: ""
      no_color: false
      stgraber@orilla:~$ incus default set list_format=compact
      stgraber@orilla:~$ incus storage list
        NAME    DRIVER  DESCRIPTION  USED BY   STATE  
       default  zfs                  11       CREATED 
      stgraber@orilla:~$ incus default unset list_format
      stgraber@orilla:~$ incus storage list
      +---------+--------+-------------+---------+---------+
      |  NAME   | DRIVER | DESCRIPTION | USED BY |  STATE  |
      +---------+--------+-------------+---------+---------+
      | default | zfs    |             | 11      | CREATED |
      +---------+--------+-------------+---------+---------+
      stgraber@orilla:~$ 

  <!--
  The documentation for those options has also been updated:
  -->
  これらのオプションに関するドキュメントも更新されました:

  https://linuxcontainers.org/incus/docs/main/client-config/

  ## デフォルトでフィルタリングされたサーバー情報 <!-- Filtered server info by default -->
  <!--
  `incus info` now defaults to a filtered view of the server information.
  -->
  `incus info` は、フィルタリングされたサーバー情報表示がデフォルトになりました。

  <!--
  This hides (replaces with `SENSITIVE`) all private keys, certificates and other tokens by default, requiring `\-\-show-sensitive` to reveal them. It also makes the output shorter by hiding the full list of API extensions and instead just showing a count.
  -->
  デフォルトでは、すべての秘密鍵、証明書、その他のトークンが隠されます（`SENSITIVE` に置き換えられます）。これらを表示するには、`--show-sensitive` オプションが必要です。また、API 拡張の完全なリストを非表示にし、代わりにその数だけを表示することで、出力が簡潔になります。

  ## CLI からの Keepalive タイムアウト <!-- Keepalive timeout from the CLI -->
  <!--
  The `incus remote` command gained a `set-keepalive` subcommand to configure (or disable) the connection keepalive timeout.
  -->
  `incus remote` コマンドに、接続の Keepalive タイムアウトを設定するための `set-keepalive` サブコマンドが追加されました。

      stgraber@orilla:~$ incus remote set-keepalive my-remote 30
      stgraber@orilla:~$ incus remote set-keepalive my-remote 0

  <!--
  The CLI keepalive feature is used to maintain a connection with the remote server, making subsequent interactions a fair bit faster. This is particularly useful on higher latency connections as well as in environments where a lot of `incus` commands are being run.
  -->
  CLI の Keepalive 機能は、リモートサーバーとの接続を維持するために使われます。それにより、後続のやりとりをかなり高速化します。これは、レイテンシーの高い接続や、多数の `incus` コマンドが実行される環境で特に役に立ちます。

  ## CLI 設定の OS ごとの適切な処理 <!-- Better OS-specific handling of CLI configuration -->
  <!--
  The CLI now stores its configuration and cache data in the correct per-OS location.
  -->
  CLI が、設定やキャッシュデータを OS ごとの適切な場所に保存するようになりました。

  <!--
  Up until now, the CLI tool would always use `~/.config/incus/` and `~/.cache/incus/` regardless of operating system, leading to an unusual location on MacOS and Windows.
  -->
  これまでは、CLI は OS を問わず、常に `~/.config/incus/` と `~/.cache/incus/` を使用していました。その結果、macOS や Windows では、標準的ではない場所に保存されていました。

  <!--
  With Incus 7.2, MacOS now uses `~/Library/Application Support/incus/` whereas Windows uses `%APPDATA%\incus`. The CLI will automatically relocate its configuration on first use.
  -->
  Incus 7.2 からは、macOS では `~/Library/Application Support/incus/` が、Windows では `%APPDATA%\incus` が使われるようになりました。CLI は初回起動時に自動的に設定ファイルを新しい場所に移動します。

  ## スタンドアロンサーバーの証明書更新 <!-- Standalone server certificate update -->
  <!--
  A new `incus admin update-certificate` command allows replacing the server certificate on standalone (non-clustered) systems.
  -->
  新しいコマンド `incus admin update-certificate` を使うと、（クラスター化されていない）スタンドアロンシステム上のサーバー証明書を置き換えられるようになりました。

  <!--
  This is the equivalent to `incus cluster update-certificate` but for standalone systems. It replaces directly modifying the files in `/var/lib/incus/`.
  -->
  このコマンドは、スタンドアロンシステム向けの機能であり、`incus cluster update-certificate` に相当するコマンドです。`/var/lib/incus/` 内のファイルを直接変更する方法が、このコマンドに置き換えられました。

  ## OCI コンテナの静的ネットワーク設定 <!-- Static network configuration for OCI containers -->
  <!--
  OCI application containers can now have their network statically configured.
  -->
  OCI アプリケーションコンテナで、ネットワークを静的に設定できるようになりました。

  <!--
  The NIC `ipv4.address` and `ipv6.address` keys accept a CIDR value to statically configure the address inside the container, and the new `ipv4.gateway` and `ipv6.gateway` keys set the default gateway. Setting either address to `none` prevents any configuration for that address family and stops the built-in DHCP client from running on it.
  -->
  NIC の `ipv4.address` と `ipv6.address` キーに CIDR 値を設定し、コンテナ内のアドレスを静的に設定できます。そして、新たな `ipv4.gateway`と `ipv6.gateway` キーでデフォルトゲートウェイを設定します。いずれかのアドレスを `none` に設定することで、そのアドレスファミリーに対して設定されなくなり、組み込みの DHCP クライアントも、そのアドレスファミリーに対しては動作しなくなります。

  <!--
  For DNS, the new `oci.dns.nameservers`, `oci.dns.domain` and `oci.dns.search` instance configuration keys set the initial content of the container's `resolv.conf`, which is then extended with anything received over DHCP.
  -->
  DNS に関して、新しいインスタンス設定キー `oci.dns.nameservers`、`oci.dns.domain`、`oci.dns.search` を使用して、コンテナの `resolv.conf` の初期内容を設定できます。この設定内容は、DHCP 経由で受信した情報でさらに拡張されます。

  <!--
  All of those keys are only valid for OCI containers.
  -->
  これらのキーはすべて、OCI コンテナに対してのみ有効です。

      stgraber@orilla:~$ incus create docker:nginx my-nginx
      Creating my-nginx
      stgraber@orilla:~$ incus config set my-nginx oci.dns.nameservers=1.0.0.1,1.1.1.1 oci.dns.domain=stgraber.net
      stgraber@orilla:~$ incus config device override my-nginx eth0 ipv4.address=10.10.10.2/24 ipv4.gateway=10.10.10.1
      Device eth0 overridden for my-nginx
      stgraber@orilla:~$ incus start my-nginx
      stgraber@orilla:~$ incus list my-nginx
      +----------+---------+-------------------+------------------------------------------------+-----------------+-----------+
      |   NAME   |  STATE  |       IPV4        |                      IPV6                      |      TYPE       | SNAPSHOTS |
      +----------+---------+-------------------+------------------------------------------------+-----------------+-----------+
      | my-nginx | RUNNING | 10.10.10.2 (eth0) | fd42:8b9f:58e4:b6ac:1266:6aff:fecb:e324 (eth0) | CONTAINER (APP) | 0         |
      +----------+---------+-------------------+------------------------------------------------+-----------------+-----------+

  ## インスタンスごとの BGP ルートアドバタイズ <!-- Per-instance BGP route advertisement -->
  <!--
  Managed bridge networks gained two new configuration keys, `bgp.ipv4.instances` and `bgp.ipv6.instances`.
  -->
  マネージドブリッジネットワークに、新しい設定キーが 2 つ追加されました。`bgp.ipv4.instances` と `bgp.ipv6.instances` です。

  <!--
  When enabled, Incus advertises a `/32` (IPv4) or `/128` (IPv6) route over BGP for each running instance connected to the network, withdrawing the route again when the instance stops. This makes it easy to route directly to individual instances in a BGP environment.
  -->
  有効にすると、Incus は、ネットワークに接続されている実行中のインスタンスそれぞれに対して、BGP 経由で `/32` （IPv4）または `/128` （IPv6） のルートを広告し、インスタンスが停止するとルートを取り消します。これにより BGP 環境において、個々のインスタンスに直接ルーティングすることが容易になります。

  <!--
  As part of that, Incus has now grown the ability to learn instance IP addresses by monitoring ARP/NDP for a limited period of time on instance startup.
  -->
  その一環として、Incus にインスタンス起動時に一定期間 ARP/NDP をモニタリングして、インスタンスの IP アドレスを学習する機能が拡張されました。

  ドキュメント <!-- Documentation -->: https://linuxcontainers.org/incus/docs/main/reference/network_bridge/

  ## プロキシー NAT モードでのダイナミックアドレス <!-- Dynamic addresses in proxy NAT mode -->
  <!--
  Building on the new ability to detect instance IP addresses, proxy devices running in NAT mode can now use dynamic addresses and a wildcard listen address, removing the need to hardcode the instance address in the proxy device configuration.
  -->
  インスタンスの IP アドレスを検出する機能をもとにして、NAT モードで実行されるプロキシーデバイスは、動的アドレスとワイルドカードリッスンアドレスを使用できるようになりました。これにより、プロキシーデバイスの設定でインスタンスのアドレスをハードコードする必要がなくなりました。

      stgraber@orilla:~$ incus launch docker:nginx my-nginx
      Launching my-nginx
      stgraber@orilla:~$ incus config device add my-nginx http-80 proxy listen=tcp:0.0.0.0:1234 connect=tcp:0.0.0.0:80 nat=true
      Device http-80 added to my-nginx
      stgraber@orilla:~$ incus list my-nginx
      +----------+---------+--------------------+------------------------------------------------+-----------------+-----------+
      |   NAME   |  STATE  |        IPV4        |                      IPV6                      |      TYPE       | SNAPSHOTS |
      +----------+---------+--------------------+------------------------------------------------+-----------------+-----------+
      | my-nginx | RUNNING | 10.80.1.162 (eth0) | fd42:8b9f:58e4:b6ac:1266:6aff:fe55:dbdb (eth0) | CONTAINER (APP) | 0         |
      +----------+---------+--------------------+------------------------------------------------+-----------------+-----------+
      stgraber@orilla:~$ ip -4 a show dev enp0s5
      2: enp0s5: <BROADCAST,MULTICAST,UP,LOWER_UP> mtu 1500 qdisc fq_codel state UP group default qlen 1000
          altname enx001c42e6a809
          inet 10.211.55.3/24 brd 10.211.55.255 scope global dynamic noprefixroute enp0s5
             valid_lft 1031sec preferred_lft 1031sec
      stgraber@orilla:~$ nc -v 10.211.55.3 1234
      Connection to 10.211.55.3 1234 port [tcp/*] succeeded!

  ## VM に対する NBD アクセスの拡張 <!-- Expanded NBD access to VMs -->
  <!--
  A new `GET /1.0/instances/{name}/nbd` endpoint exposes all disks attached to a virtual machine over NBD, allowing concurrent access to every disk rather than a single volume at a time.
  -->
  新たに公開された `GET /1.0/instances/{name}/nbd` エンドポイントにより、仮想マシンに接続されているすべてのディスクが NBD 経由で公開され、一度に 1 つのボリュームではなく、すべてのディスクに同時にアクセスできるようになりました。

  <!--
  This is also wired up to a new `incus debug nbd` command which supports multiple concurrent client connections.
  -->
  これは、複数クライアントによる同時接続をサポートする新しい `incus debug nbd` コマンドにも統合されています。

      stgraber@orilla:~$ incus start v1
      stgraber@orilla:~$ incus debug nbd v1
      NBD listening on 127.0.0.1:36539

  <!--
  Those APIs are primarily meant for backup systems needing to easily and consistently access all of the drives on a VM. The NBD export also exposes the dirty bitmaps, allowing for easy incremental backups to be made.
  -->
  これらの API は、主に VM 上のすべてのドライブに容易に、一貫してアクセスする必要があるバックアップシステム用に作られています。NBD エクスポートでは、ダーティービットマップも公開されるため、容易にインクリメンタルバックアップが作成できます。

  <!--
  Restoration can be done through the individual volume's NBD API when the instance is stopped.
  -->
  インスタンスが停止している場合、個々のボリュームの NBD API を通して復元を実行できます。

  ## ストレージボリュームの Btrfs 圧縮 <!-- Btrfs compression for storage volumes -->
  <!--
  A new `btrfs.compression` storage volume configuration key was added for the `btrfs` driver. It maps to the Btrfs `compression` property and takes the same values (for example `zstd`, `lzo`, `zlib` or `none`).
  -->
  `btrfs` ドライバーに、新たにストレージボリュームに関する `btrfs.compression` 設定キーが追加されました。これは Btrfs の `compression` プロパティーにマップされ、同じ値を取ります（例えば `zstd`、`lzo`、`zlib`、`none`）。

  <!--
  This can also be used to override compression settings from an existing btrfs filesystem, allowing for the Incus volumes to use a different compression algorithm as well as allowing turning off compression which then allows Incus to set the `nocow` flag on virtual machine disks.
  -->
  これは、既存の Btrfs ファイルシステムの圧縮設定を上書きするのに使えます。そして、Incus ボリュームで異なる圧縮アルゴリズムを使ったり、圧縮をオフにしたりできるようになります。圧縮をオフにすることにより、Incus は仮想マシンのディスクに対して `nocow` フラグを設定できるようになります。

  ドキュメント <!-- Documentation -->: https://linuxcontainers.org/incus/docs/main/reference/storage_btrfs/

  ## InfiniBand の SR-IOV GUID 設定 <!-- InfiniBand SR-IOV GUID configuration -->
  <!--
  `infiniband` devices using the `sriov` `nictype` now support two new configuration keys, `node_guid` and `port_guid`.
  -->
  `sriov` `nictype` を使用する `infiniband` デバイスで新しい設定キー `node_guid` と `port_guid` がサポートされるようになりました。

  <!--
  When set, the matching GUID of the allocated virtual function is changed to the provided value when the instance starts and restored to its original value when the instance stops.
  -->
  これらのキーが設定されると、割り当てられた仮想機能の対応する GUID は、インスタンスの起動時に指定された値に変更され、インスタンスの停止時に元の値に戻ります。

  ドキュメント <!-- Documentation -->: https://linuxcontainers.org/incus/docs/main/reference/devices_infiniband/

  ## Websocket オリジン制限 <!-- Websocket origin restriction -->
  <!--
  A new `core.https_allowed_websocket_origin` server configuration key was added.
  -->
  新たなサーバー設定キー `core.https_allowed_websocket_origin` を追加しました。

  <!--
  It can be set to a comma-separated list of allowed origins or to the `*` wildcard, controlling which origins are accepted on websocket connections.
  -->
  許可するオリジンのカンマ区切りのリスト、もしくはワイルドカードとして `*` が指定できます。これにより、Websocket 接続で受け付けるオリジンを制御できます。

  <!--
  This is useful for cross-origin access as well as in some proxied environments.
  -->
  これは、クロスオリジンアクセスだけでなく、一部のプロキシー環境においても役に立ちます。

  ドキュメント <!-- Documentation -->: https://linuxcontainers.org/incus/docs/main/server_config/#server-options-core

  # 遅延機能のロギング <!-- Deferred function logging -->
  <!--
  A large, repository-wide change in this release adds logging for deferred cleanup calls.
  -->
  今回のリリースで、リポジトリー全体にわたる大きな変更として、遅延したクリーンアップ呼び出しのロギングが追加されました。

  <!--
  As a result, users may notice a number of new `WARNING` level log entries (for example around closing files, sockets or response bodies). This is expected and does not indicate a regression; these errors were always occurring but were simply discarded before.
  -->
  その結果、ユーザーは、多数の新しい `WARNING` レベルのログエントリーに気づくかもしれません（例えば、ファイル・ソケット・レスポンスボディーのクローズに関するログ）。これは想定内の動作であり、不具合を示すものではありません。これらのエラーは以前から起こっていたものの、単に無視されていただけです。

  <!--
  If you notice spurious/repetitive such messages, please let us know so they can be investigated or silenced.
  -->
  もしそのような不審だったり、繰り返しのメッセージに気づいた場合、調査や出力停止ができる可能性があるため、お知らせください。

