  # ドキュメント <!-- Documentation -->
  <!--
  The Incus documentation can be found at:
  -->
  Incus のドキュメントはこちらです:
  https://incus-ja.readthedocs.io/ja/latest/ （日本語訳）
  https://linuxcontainers.org/incus/docs/main/ （原文）

  # インストール <!-- Installation -->
  <!--
  There are no official Incus packages as Incus upstream only releases regular release tarballs. Below are some available options to get Incus up and running.
  -->
    Incus の開発元は、通常リリースの tarball のみをリリースするため、公式の Incus パッケージはありません。Incus を実行するために使えるオプションを以下にいくつか示します。

  ## Linux パッケージ <!-- Linux packages -->
  <!--
  Incus is available for most common Linux distributions. You'll find detailed installation instructions in our documentation.
  -->
  Incus はほとんどの一般的な Linux ディストリビューションで利用できます。インストール手順の詳細は、Incus のドキュメントを参照してください。

  https://incus-ja.readthedocs.io/ja/latest/installing/ （日本語訳）
  https://linuxcontainers.org/incus/docs/main/installing/ （原文）

  ## Incus クライアントの Homebrew パッケージ <!-- Homebrew package for the Incus client -->
  <!--
  The client tool is available through HomeBrew for both Linux and MacOS.
  -->
  Homebrew 経由で、Linux と macOS 向けにクライアントツールが利用できます。

  https://formulae.brew.sh/formula/incus

  ## Incus クライアントの Chocolatey パッケージ <!-- Chocolatey package for the Incus client -->
  <!--
  The client tool is available through Chocolatey for Windows users.
  -->
  Chocolatey 経由で、Windows ユーザー向けにクライアントツールが利用できます。

  https://community.chocolatey.org/packages/incus/7.0.0

  ## Incus クライアントの Winget パッケージ <!-- Winget package for the Incus client -->
  <!--
  The client tool is also available through Winget for Windows users.
  -->
  Winget 経由で、Windows ユーザー向けにクライアントツールが利用できます。

  https://winstall.app/apps/LinuxContainers.Incus

  # LXD からの移行 <!-- Migrating from LXD -->
  <!--
  A `lxd-to-incus` migration tool allows for in-place migration from LXD to Incus.
  It's been tested with LXD versions as low as 4.0 LTS and as high as the latest LXD 5.21 bugfix release.
  -->
  `lxd-to-incus` 移行ツールを使用すると、LXD から Incus へ直接移行できます。
  このツールは、LXD 4.0 LTS から最新の LXD 5.21 バグ修正リリースまで、幅広いバージョンでテストされています。

  <!--
  It allows for a very quick migration from LXD over to Incus, automatically checking for potential conflicts ahead of time.
  -->
  事前に、潜在的なコンフリクトを自動的にチェックし、LXD から Incus への非常に素早い移行が可能です。

  <!--
  [![asciicast](upload://tEIilOgSuWcTskZUkUPXs0FyXo1.svg)](https://asciinema.org/a/650718)
  -->
  [![asciicast](https://discuss.linuxcontainers.org/uploads/default/original/2X/c/cfd9406f32d7e9e6ad28e55806955c004db7f7bd.svg)](https://asciinema.org/a/650718)

  詳細はこちらをご覧ください <!-- More details can be found here -->: https://linuxcontainers.org/incus/docs/main/howto/server_migrate_lxd/

  # サポート <!-- Support -->
  <!--
  Incus 7.0 LTS will be supported for a total of 5 years (until June 2031).
  -->
  Incus 7.0 LTS は、合計 5 年間（2031 年 6 月まで）サポートされます。

  <!--
  During the first 2 years, new point releases will be issued including a mix of bug and security fixes as well as some minor usabiltiy improvements. After that initial 2 years (after Incus 8.0 LTS is released), Incus 7.0 LTS will transition to security fixes only for the remaining 3 years.
  -->
  最初の 2 年間は、バグ修正やセキュリティ修正、および軽微なユーザビリティ改善を含むポイントリリースが提供されます。最初の 2 年間が経過した後（Incus 8.0 LTSのリリース後）は、Incus 7.0 LTS は残りの 3 年間はセキュリティ修正のみのサポートに移行します。

  <!--
  This matches what we've been doing for our other projects (LXC and LXCFS) over the past 10 years.
  -->
  これは、過去 10 年間、他のプロジェクト（LXCおよびLXCFS）で実施してきたサポートと同様です。

  コミュニティサポートはこちらから <!-- Community support is provided at -->: https://discuss.linuxcontainers.org
  商用サポートはこちらから <!-- Commercial support is available through -->: https://zabbly.com/incus
  バグはこちらから報告できます <!-- Bugs can be reported at -->: https://github.com/lxc/incus/issues
