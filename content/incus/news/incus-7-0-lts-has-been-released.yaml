title: Incus 7.0 LTS has been released
date: 2026/05/05 16:05
origin: https://discuss.linuxcontainers.org/t/incus-7-0-lts-has-been-released/26641
content: |-
  # Introduction
  It's with great pride and pleasure that the Incus team is announcing the release of Incus 7.0 LTS!

  [Incus](https://linuxcontainers.org/incus/) is a modern system container, application container and virtual machine manager. It's released under the Apache 2.0 license and is run as a community led Open Source project as part of the [Linux Containers](https://linuxcontainers.org) organization.

  Incus provides a cloud-like environment, creating instances from [our premade images](https://images.linuxcontainers.org) or any OCI registry and offers a wide variety of features, including the ability to seamlessly cluster servers together.

  It supports multiple different local or remote storage options, traditional or fully distributed networking and offers most common cloud features, including a [full REST API](https://linuxcontainers.org/incus/docs/main/rest-api-spec/) and [integrations](https://linuxcontainers.org/incus/docs/main/third_party/) with common tooling like Ansible, Terraform/OpenTofu, Packr, Kubernetes Cluster API and more!

  [![image|690x225](https://discuss.linuxcontainers.org/uploads/default/original/2X/0/0ea6c0aea831f27906f19c8235e8188062e7aac6.jpeg)](https://linuxcontainers.org/incus/try-it/)

  This is the second LTS release for Incus with Incus 6.0 LTS now entering its security-only phase for the remaining 3 years of its 5 years lifespan.

  Incus 7.0 LTS joins [LXC 7.0 LTS](https://discuss.linuxcontainers.org/t/lxc-7-0-lts-has-been-released/26612/1) and [LXCFS 7.0 LTS](https://discuss.linuxcontainers.org/t/lxcfs-7-0-lts-has-been-released/26607/1) in wrapping up this round of LTS releases.

  Just like its sister projects, Incus 7.0 LTS will be supported until **June 2031**.

  The first 2 years will feature bug and security fixes as well as minor usability improvements, delivered through occasional point releases (7.0.x). After that initial two years, Incus 7.0 LTS will move to security only maintenance for the remaining of its 5 years of support.

  A total of 204 individuals contributed to Incus between the 6.0 LTS and 7.0 LTS releases with 45 contributing between the 6.23 and 7.0 LTS releases.

  As usual, you can try it for yourself online: https://linuxcontainers.org/incus/try-it/

  Enjoy!

  # Security fixes
