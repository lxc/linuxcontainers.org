title: LXCFS 7.0 LTS リリースのお知らせ <!-- LXCFS 7.0 LTS has been released -->
date: 2026/04/29 00:04
origin: https://discuss.linuxcontainers.org/t/lxcfs-7-0-lts-has-been-released/26607
content: |-
  # はじめに <!-- Introduction-->
  <!--
  The LXCFS team is pleased to announce the release of LXCFS 7.0 LTS!
  -->
  LXCFS チームが LXCFS 7.0 LTS のリリースをお知らせします!

  <!--
  This is the result of two years of work since the LXCFS 6.0 release and is the seventh LTS release for the LXCFS project. This release will be supported until June 2031.
  -->
  このリリースは、LXCFS 6.0 のリリース以来 2 年の作業の成果であり、LXCFS プロジェクトにとって 7 番目の LTS リリースとなります。このリリースは 2031 年 6 月までサポートされます。

  # ハイライト <!-- Highlights -->
  ## PSI（Pressure Stall Information）のサポート <!-- Support for PSI (Pressure Stall Information) -->
  <!--
  LXCFS now virtualizes the /proc/pressure files:
  -->
  LXCFS は次の /proc/pressure ファイルを仮想化するようになりました。

   - /proc/pressure/cpu
   - /proc/pressure/io
   - /proc/pressure/memory

  ## zswap サポート <!-- zswap support -->
  <!--
  LXCFS now exposes zswap metrics in the virtualized /proc/meminfo.
  -->
  LXCFS は、仮想化された /proc/meminfo に zswap メトリクスを公開するようになりました。

  ## 廃止された機能 <!-- Deprecated features -->
  <!--
  This release removes support for:
  -->
  今回のリリースで、次の機能のサポートが削除されます:

   - FUSE2 （以降、FUSE3 のみ）<!-- (only FUSE3 from this point) -->
   - CGroup V1 （cgroup v2 単一階層構造のみ）<!-- (CGroup V2 unified hierarchy only) -->
   - 仮想 cgroup ツリー（cgroup namespace が広く利用可能）<!-- Virtual cgroup tree (cgroup namespace is widely available) -->

  <!--
  This shouldn't cause any real issue as most Linux distributions have been running on CGroup V2 for a while now and they have also been typically defaulting to FUSE3.
  -->
  しばらく前から、ほとんどの Linux ディストリビューションは cgroup v2 で動作しており、また通常は FUSE3 をデフォルトにしているため、実際には問題にならないはずです。

  ## デフォルトで PIDFD を使用 <!-- PIDFD by default -->
  <!--
  We're now assuming kernel support for PIDFD with this now being used by default by LXCFS (was previously under `--enable-pidfd`).
  -->
  現在、カーネルが PIDFD をサポートしているという想定をしています。そして、LXCFS では PIDFD をデフォルトで使用します（以前は `--enable-pidfd` を指定していました）。

