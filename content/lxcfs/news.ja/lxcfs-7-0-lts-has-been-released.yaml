  # サポートとアップグレード <!-- Support and upgrade -->
  <!--
  LXCFS 7.0 will be supported until June 2031 and our current LTS release, LXCFS 6.0 will now switch to a slower maintenance pace, only getting critical bugfixes and security updates.
  -->
  LXCFS 7.0 は 2031 年 6 月までサポートされる、現在の LTS リリースです。LXCFS 6.0 は、メンテナンスのペースが遅くなり、重要なバグ修正とセキュリティアップデートのみが提供されるようになります。

  <!--
  We strongly recommend all LXCFS users to plan an upgrade to the 7.0 branch.
  -->
  すべての LXCFS ユーザーは、7.0 ブランチへのアップグレードを計画することを強くおすすめします。

