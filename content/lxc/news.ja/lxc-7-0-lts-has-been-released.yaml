title: LXC 7.0 LTS リリースのお知らせ <!-- LXC 7.0 LTS has been released -->
date: 2026/04/30 00:04
origin: https://discuss.linuxcontainers.org/t/lxc-7-0-lts-has-been-released/26612
content: |-
  # はじめに <!-- Introduction -->
  <!--
  The LXC team is pleased to announce the release of LXC 7.0 LTS!
  -->
  LXC チームが LXC 7.0 LTS のリリースをお知らせします!

  <!--
  This is the result of two years of work since the LXC 6.0 release and is the seventh LTS release for the LXC project. This release will be supported until June 2031.
  -->
  このリリースは、LXC 6.0 リリース以来 2 年の作業の成果です。そして、LXC プロジェクトにとって 7 回目の LTS リリースです。このリリースは 2031 年 6 月までサポートされます。

  # セキュリティ <!-- Security -->
  <!--
  This release fixes one security issue:
   - [CVE-2026-39402 (OVS port deletion authorization bypass in lxc-user-nic)](https://github.com/lxc/lxc/security/advisories/GHSA-3m9j-g9gc-vcvq)
  -->
  このリリースでは、セキュリティの問題を 1 件修正しています:

   - [CVE-2026-39402 (lxc-user-nic における OVS ポート削除の認証バイパス)](https://github.com/lxc/lxc/security/advisories/GHSA-3m9j-g9gc-vcvq)

  # ハイライト <!-- Highlights -->
  ## モニタープロセスの Landlock による保護 <!-- Landlock protection of the monitor process -->
  <!--
  When built with `landlock-monitor`, LXC will now use Landlock to restrict what the monitor API handlers can do on the system. Effectively limiting them to interaction with the container and its filesystem.
  -->
  `landlock-monitor` を有効にしてビルドすると、LXC は Landlock を使用して、モニター API ハンドラーがシステム上で実行できる操作を制限するようになりました。これにより、ハンドラーは、コンテナとそのコンテナのファイルシステムのみとやりとりをするように制限されます。

  ## フックと環境変数設定の分離 <!-- Split of hook and runtime environment configuration -->
  <!--
  Two new configuration keys have been introduced:
  -->
  新たな設定キーが 2 つ導入されました:

   - lxc.environment.hooks
   - lxc.environment.runtime

  <!--
  Those can be used to only expose some environment variables to the container without impacting the hooks or vice-versa.
  -->
  これらを使うことで、フックに影響を与えることなく、一部の環境変数のみをコンテナに公開したり、その逆を行ったりできます。

  ## 廃止された機能 <!-- Deprecated features -->
  <!--
  This release removes support for:
  -->
  このリリースでは次の機能が廃止されました:

   - CGroupV1
   - PIDFD をサポートしないカーネル <!-- Kernels without PIDFD support -->
   - 新しいマウント API をサポートしないカーネル <!-- Kernels without the new mount API -->

